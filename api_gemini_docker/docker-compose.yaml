services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-gemini-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - PORT=5000
      - CORS_ORIGINS=*

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: api-gemini-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend
