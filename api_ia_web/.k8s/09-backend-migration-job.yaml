apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migration-job
  namespace: api-ia-web
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: backend-migration
          image: api-ia-web-backend:dev
          imagePullPolicy: Never
          command: ["npm", "run", "migrate"]
          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret
