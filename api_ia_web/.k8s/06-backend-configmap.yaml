apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: api-ia-web
data:
  NODE_ENV: "production"
  PORT: "3000"
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service:5432/api_ia_web"
  JWT_EXPIRES_IN: "1d"
  CORS_ORIGIN: "http://localhost:5173,http://localhost:8080,http://api-ia-web.local"